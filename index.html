<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Desk — office booking</title>
  <meta name="description" content="Hot-desk + meeting-room booking for a 50-person office.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🪑%3C/text%3E%3C/svg%3E">
  <style>
    :root{
      --bg:#FFB84D; --ink:#2b2b29; --muted:#74726a; --panel:#fffaf0; --line:#2b2b29;
      --accent:#D56062; --olive:#50514F; --good:#7fb069; --bad:#D56062;
      --you:#50514F; --free:#fffaf0; --taken:#e9e3d3;
    }
    [data-theme="dark"]{
      --bg:#3f403e; --ink:#FFB84D; --muted:#b9b08f; --panel:#4b4c49; --line:#1b1b1a;
      --accent:#ff9aa0; --olive:#FFB84D; --good:#9bc97a; --bad:#ff9aa0;
      --you:#FFB84D; --free:#4b4c49; --taken:#2f302e;
    }
    *{ margin:0; box-sizing:border-box; }
    html,body{ background:var(--bg); color:var(--ink); }
    body{
      min-height:100vh; font-family:"Orbitron",sans-serif;
      padding:18px clamp(12px,3vw,32px) 60px; transition:background-color .25s, color .25s;
    }
    .pixel{ font-family:"Press Start 2P",monospace; }

    header.bar{
      display:flex; flex-wrap:wrap; align-items:center; gap:12px;
      margin-bottom:18px; padding-bottom:14px; border-bottom:3px solid var(--line);
    }
    h1.brand{ font-family:"Press Start 2P",monospace; font-size:clamp(.95rem,2.6vw,1.4rem);
      text-shadow:3px 3px 0 var(--line); letter-spacing:.04em; }
    h1.brand .emoji{ filter:drop-shadow(2px 3px 0 rgba(0,0,0,.18)); margin-right:8px; }
    .grow{ flex:1; }
    .who{ display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .who label{ font-weight:700; letter-spacing:.05em; text-transform:uppercase; font-size:.7rem; color:var(--muted); }
    select, button.btn{
      font-family:"Orbitron",sans-serif; font-weight:700; font-size:.85rem;
      padding:8px 12px; border:3px solid var(--line); border-radius:6px;
      background:var(--panel); color:var(--ink); cursor:pointer;
      box-shadow:3px 3px 0 var(--line);
    }
    select:focus, button.btn:focus{ outline:3px solid var(--accent); outline-offset:2px; }
    .btn.tiny{ font-size:.72rem; padding:6px 10px; }
    .btn:active{ transform:translate(2px,2px); box-shadow:none; }
    .btn.danger{ color:var(--bad); }
    .toggle{ font-family:"Press Start 2P",monospace; font-size:9px; padding:9px 11px; }

    nav.tabs{ display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
    .tab{
      font-family:"Press Start 2P",monospace; font-size:10px; letter-spacing:.05em;
      padding:11px 14px; border:3px solid var(--line); border-radius:6px;
      background:var(--panel); color:var(--ink); cursor:pointer;
      box-shadow:3px 3px 0 var(--line);
    }
    .tab.active{ background:var(--accent); color:var(--panel); }
    .tab:active{ transform:translate(2px,2px); box-shadow:none; }

    .datestrip{
      display:flex; gap:8px; overflow-x:auto; padding:6px 2px 14px; margin-bottom:14px;
      scrollbar-width:thin;
    }
    .day{
      flex:0 0 auto; min-width:96px;
      border:3px solid var(--line); border-radius:8px; background:var(--panel);
      padding:8px 10px; cursor:pointer; box-shadow:3px 3px 0 var(--line);
      display:flex; flex-direction:column; gap:4px; align-items:flex-start;
      color:var(--ink);
    }
    .day:active{ transform:translate(2px,2px); box-shadow:none; }
    .day.active{ background:var(--accent); color:var(--panel); }
    .day .wd{ font-family:"Press Start 2P",monospace; font-size:9px; letter-spacing:.05em; }
    .day .dom{ font-family:"Press Start 2P",monospace; font-size:13px; }
    .day .occ{ font-size:.72rem; font-weight:700; color:var(--muted); }
    .day.active .occ{ color:var(--panel); }
    .day.weekend{ opacity:.78; }

    .panel{
      border:3px solid var(--line); border-radius:10px; background:var(--panel);
      padding:18px; box-shadow:5px 5px 0 var(--line);
    }
    h2{ font-family:"Press Start 2P",monospace; font-size:12px; letter-spacing:.04em;
      text-shadow:2px 2px 0 var(--line); margin-bottom:14px; }
    .sub{ color:var(--muted); font-size:.85rem; margin-bottom:14px; }

    .legend{ display:flex; flex-wrap:wrap; gap:10px 16px; margin-bottom:14px; font-size:.78rem; align-items:center; }
    .legend .sw{ display:inline-block; width:14px; height:14px; border:2px solid var(--line); margin-right:6px; vertical-align:-3px; border-radius:3px; }
    .sw.free{ background:var(--free); }
    .sw.you{ background:var(--you); }
    .sw.taken{ background:var(--taken); }

    .floor{
      display:grid; gap:18px;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    }
    .zone{
      border:3px dashed var(--line); border-radius:8px; padding:10px;
    }
    .zone h3{ font-family:"Press Start 2P",monospace; font-size:10px;
      color:var(--olive); letter-spacing:.05em; margin-bottom:10px; }
    .pods{ display:flex; flex-direction:column; gap:14px; }
    .pod{
      display:grid; grid-template-columns:repeat(3,1fr); gap:6px;
      padding:8px; border:2px solid var(--line); border-radius:6px;
      background:rgba(0,0,0,.04);
    }
    [data-theme="dark"] .pod{ background:rgba(255,255,255,.05); }
    .seat{
      aspect-ratio:1.1/1; border:2px solid var(--line); border-radius:5px;
      background:var(--free); cursor:pointer; position:relative;
      display:flex; align-items:center; justify-content:center;
      font-family:"Press Start 2P",monospace; font-size:9px;
      transition:transform .08s;
    }
    .seat:hover{ transform:translate(-1px,-1px); box-shadow:2px 2px 0 var(--line); }
    .seat.you{ background:var(--you); color:var(--panel); }
    .seat.taken{ background:var(--taken); color:var(--muted); cursor:not-allowed; }
    .seat.taken:hover{ transform:none; box-shadow:none; }
    .seat .tip{
      position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      background:var(--line); color:var(--panel); font-family:"Orbitron",sans-serif;
      font-size:.7rem; font-weight:700; padding:4px 8px; border-radius:4px;
      white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .12s;
      z-index:5;
    }
    .seat:hover .tip{ opacity:1; }

    .rooms{
      display:grid; gap:16px;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    }
    .room{
      border:3px solid var(--line); border-radius:8px; background:rgba(0,0,0,.03);
      padding:12px;
    }
    [data-theme="dark"] .room{ background:rgba(255,255,255,.04); }
    .room h3{ font-family:"Press Start 2P",monospace; font-size:11px; margin-bottom:4px; }
    .room .cap{ font-size:.72rem; color:var(--muted); margin-bottom:10px; }
    .slots{ display:flex; flex-direction:column; gap:4px; }
    .slot{
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 10px; border:2px solid var(--line); border-radius:5px;
      background:var(--free); cursor:pointer; font-size:.82rem; font-weight:700;
      transition:transform .08s; color:var(--ink); font-family:"Orbitron",sans-serif;
    }
    .slot:hover{ transform:translate(-1px,-1px); box-shadow:2px 2px 0 var(--line); }
    .slot .who-{ font-size:.7rem; color:var(--muted); font-weight:500; }
    .slot.you{ background:var(--you); color:var(--panel); }
    .slot.you .who-{ color:var(--panel); }
    .slot.taken{ background:var(--taken); color:var(--muted); cursor:not-allowed; }
    .slot.taken:hover{ transform:none; box-shadow:none; }

    .mb{ display:grid; gap:18px; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
    .mb section h3{ font-family:"Press Start 2P",monospace; font-size:10px; margin-bottom:10px; }
    .mb ul{ list-style:none; display:flex; flex-direction:column; gap:8px; }
    .mb li{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      padding:10px 12px; border:2px solid var(--line); border-radius:6px;
      background:rgba(0,0,0,.03);
    }
    [data-theme="dark"] .mb li{ background:rgba(255,255,255,.04); }
    .mb .meta{ font-size:.78rem; color:var(--muted); margin-top:2px; }
    .mb .empty{ font-size:.85rem; color:var(--muted); font-style:italic; justify-content:flex-start; }

    footer{ margin-top:28px; text-align:center; font-size:.82rem; }
    footer a{ color:var(--accent); font-weight:700; text-decoration:none; letter-spacing:.08em; }
    footer a:hover{ text-decoration:underline; }

    .toast{
      position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
      background:var(--line); color:var(--panel); padding:10px 16px; border-radius:6px;
      font-weight:700; font-size:.85rem; box-shadow:3px 3px 0 var(--accent);
      opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
      z-index:50;
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

    @media (max-width:520px){
      h1.brand{ font-size:.85rem; }
      .pod .seat{ font-size:8px; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <h1 class="brand"><span class="emoji">🪑</span>DESK</h1>
    <div class="grow"></div>
    <div class="who">
      <label for="user">Booking as</label>
      <select id="user" aria-label="Choose colleague"></select>
    </div>
    <button class="btn toggle" id="theme" type="button">DARK</button>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="desks" role="tab">DESKS</button>
    <button class="tab" data-tab="rooms" role="tab">MEETING ROOMS</button>
    <button class="tab" data-tab="mine" role="tab">MY BOOKINGS</button>
  </nav>

  <main id="view"></main>

  <footer>
    <a href="https://create.solhann.net">&larr; back to the gallery</a>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  const COLLEAGUES = [
    "Alex Chen","Priya Shah","Marcus Wolf","Jin Park","Sofia Romero",
    "Tom Becker","Nia Okafor","Leo Hart","Mei Tanaka","Hannah Voss"
  ];
  const DEFAULT_USER = "Alex Chen";

  const ZONES = [
    { id:"window", name:"Window",  pods:[ [1,6], [7,12] ] },
    { id:"quiet",  name:"Quiet",   pods:[ [13,18], [19,24] ] },
    { id:"collab", name:"Collab",  pods:[ [25,30], [31,36] ] },
    { id:"hotbar", name:"Hot Bar", pods:[ [37,42], [43,50] ] },
  ];
  const SEATS = (() => {
    const arr = [];
    for (const z of ZONES) for (const [a,b] of z.pods) for (let n=a; n<=b; n++) arr.push({ id:n, zone:z.name });
    return arr;
  })();
  const seatZone = id => SEATS.find(s => s.id === id)?.zone || "";

  const ROOMS = [
    { id:"sm", name:"Small",  cap:4  },
    { id:"md", name:"Medium", cap:8  },
    { id:"lg", name:"Large",  cap:14 },
  ];
  const SLOTS = (() => {
    const out = [];
    for (let h=9; h<18; h++) for (const m of [0,30]) out.push(`${String(h).padStart(2,"0")}:${m===0?"00":"30"}`);
    return out;
  })();

  const HORIZON_DAYS = 14;

  const pad = n => String(n).padStart(2,"0");
  const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
  const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
  const DATES = (() => {
    const t = today(); return Array.from({length:HORIZON_DAYS}, (_,i) => toISO(addDays(t,i)));
  })();
  const fmtWeekday = iso => new Date(iso+"T00:00:00").toLocaleDateString(undefined,{weekday:"short"}).toUpperCase();
  const fmtDom = iso => { const d = new Date(iso+"T00:00:00"); return `${d.getDate()} ${d.toLocaleDateString(undefined,{month:"short"}).toUpperCase()}`; };
  const isWeekend = iso => { const d = new Date(iso+"T00:00:00").getDay(); return d===0 || d===6; };

  const hashStr = s => { let h = 2166136261; for (let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619);} return h >>> 0; };
  const rng = seed => { let a = seed >>> 0; return () => { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; };

  const K_USER  = "desk.user";
  const K_SEATS = "desk.seats";
  const K_ROOMS = "desk.rooms";
  const K_SEED  = "desk.seeded";

  const load = (k, fallback) => { try { const v = localStorage.getItem(k); return v == null ? fallback : JSON.parse(v); } catch { return fallback; } };
  const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  function seedIfFresh() {
    if (localStorage.getItem(K_SEED)) return;
    const seats = {};
    const rooms = {};
    const user = load(K_USER, DEFAULT_USER);
    const others = COLLEAGUES.filter(c => c !== user);

    for (let i=0; i<HORIZON_DAYS; i++) {
      const iso = DATES[i];
      const r = rng(hashStr(iso));
      const dayBookings = {};
      const target = isWeekend(iso) ? 5 : 15;
      const seatPool = SEATS.map(s=>s.id);
      for (let j = seatPool.length - 1; j > 0; j--) { const k = Math.floor(r() * (j+1)); [seatPool[j], seatPool[k]] = [seatPool[k], seatPool[j]]; }
      const usedNamesToday = new Set();
      for (let j=0; j<target && j<seatPool.length; j++) {
        let name, tries = 0;
        do { name = others[Math.floor(r() * others.length)]; tries++; } while (usedNamesToday.has(name) && tries < 20);
        usedNamesToday.add(name);
        dayBookings[seatPool[j]] = name;
      }
      if (Object.keys(dayBookings).length) seats[iso] = dayBookings;

      if (!isWeekend(iso)) {
        const numBookings = 2 + Math.floor(r()*3);
        const roomDay = {};
        for (let b=0; b<numBookings; b++) {
          const room = ROOMS[Math.floor(r()*ROOMS.length)];
          const len = 1 + Math.floor(r()*3);
          const startIdx = Math.floor(r()*(SLOTS.length - len));
          const name = others[Math.floor(r()*others.length)];
          roomDay[room.id] = roomDay[room.id] || {};
          for (let s=0; s<len; s++) {
            const slot = SLOTS[startIdx + s];
            if (!roomDay[room.id][slot]) roomDay[room.id][slot] = name;
          }
        }
        if (Object.keys(roomDay).length) rooms[iso] = roomDay;
      }
    }
    save(K_SEATS, seats);
    save(K_ROOMS, rooms);
    localStorage.setItem(K_SEED, "1");
  }

  if (new URLSearchParams(location.search).has("reset")) {
    [K_USER,K_SEATS,K_ROOMS,K_SEED].forEach(k => localStorage.removeItem(k));
    history.replaceState(null, "", location.pathname);
  }
  if (!localStorage.getItem(K_USER)) save(K_USER, DEFAULT_USER);
  seedIfFresh();

  const state = {
    user: load(K_USER, DEFAULT_USER),
    seats: load(K_SEATS, {}),
    rooms: load(K_ROOMS, {}),
    tab: "desks",
    date: DATES[0],
  };
  const persist = () => { save(K_USER,state.user); save(K_SEATS,state.seats); save(K_ROOMS,state.rooms); };

  const seatOf = (iso, id) => state.seats[iso]?.[id];
  const roomOf = (iso, rid, slot) => state.rooms[iso]?.[rid]?.[slot];
  const occOf  = iso => Object.keys(state.seats[iso] || {}).length;
  const userHasSeatOn = iso => Object.entries(state.seats[iso]||{}).find(([,n]) => n===state.user)?.[0];

  function bookSeat(iso, seatId) {
    if (seatOf(iso, seatId)) return;
    const existing = userHasSeatOn(iso);
    if (existing) delete state.seats[iso][existing];
    state.seats[iso] = state.seats[iso] || {};
    state.seats[iso][seatId] = state.user;
    persist();
    toast(existing ? `Moved to seat ${seatId}` : `Booked seat ${seatId}`);
  }
  function cancelSeat(iso, seatId) {
    if (state.seats[iso]?.[seatId] !== state.user) return;
    delete state.seats[iso][seatId];
    if (!Object.keys(state.seats[iso]).length) delete state.seats[iso];
    persist();
    toast(`Cancelled seat ${seatId}`);
  }
  function bookSlot(iso, rid, slot) {
    if (roomOf(iso, rid, slot)) return;
    state.rooms[iso] = state.rooms[iso] || {};
    state.rooms[iso][rid] = state.rooms[iso][rid] || {};
    state.rooms[iso][rid][slot] = state.user;
    persist();
    toast(`Booked ${ROOMS.find(r=>r.id===rid).name} @ ${slot}`);
  }
  function cancelSlot(iso, rid, slot) {
    if (state.rooms[iso]?.[rid]?.[slot] !== state.user) return;
    delete state.rooms[iso][rid][slot];
    if (!Object.keys(state.rooms[iso][rid]).length) delete state.rooms[iso][rid];
    if (!Object.keys(state.rooms[iso]).length) delete state.rooms[iso];
    persist();
    toast(`Cancelled ${ROOMS.find(r=>r.id===rid).name} @ ${slot}`);
  }

  const view = document.getElementById("view");

  function renderHeader() {
    const sel = document.getElementById("user");
    sel.innerHTML = COLLEAGUES.map(c => `<option ${c===state.user?"selected":""}>${c}</option>`).join("");
    sel.onchange = e => { state.user = e.target.value; persist(); render(); };
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.toggle("active", t.dataset.tab === state.tab);
      t.onclick = () => { state.tab = t.dataset.tab; render(); };
    });
  }

  function renderDateStrip(){
    return `<div class="datestrip" aria-label="Pick a date">
      ${DATES.map(iso => `
        <button class="day ${iso===state.date?"active":""} ${isWeekend(iso)?"weekend":""}" data-date="${iso}">
          <span class="wd">${fmtWeekday(iso)}</span>
          <span class="dom">${fmtDom(iso)}</span>
          <span class="occ">${occOf(iso)}/50 BOOKED</span>
        </button>`).join("")}
    </div>`;
  }
  function wireDateStrip(){
    view.querySelectorAll(".day").forEach(el => {
      el.onclick = () => { state.date = el.dataset.date; render(); };
    });
  }

  function renderDesks(){
    const iso = state.date;
    const mySeat = userHasSeatOn(iso);
    const legend = `
      <div class="legend">
        <span><span class="sw free"></span>Free</span>
        <span><span class="sw you"></span>You (${state.user})</span>
        <span><span class="sw taken"></span>Booked</span>
        <span style="margin-left:auto" class="meta">${mySeat ? `Your seat: <b>${mySeat}</b> · ${seatZone(+mySeat)}` : "You have no seat yet"}</span>
      </div>`;
    const zonesHtml = ZONES.map(z => `
      <div class="zone">
        <h3>${z.name.toUpperCase()} &middot; ${z.pods.reduce((a,p)=>a+(p[1]-p[0]+1),0)} seats</h3>
        <div class="pods">
          ${z.pods.map(([a,b])=>{
            const ids = []; for (let n=a;n<=b;n++) ids.push(n);
            return `<div class="pod">${ids.map(id=>{
              const taker = seatOf(iso,id);
              const cls = !taker ? "free" : (taker===state.user ? "you" : "taken");
              const tip = taker ? (taker===state.user ? "Your seat — click to cancel" : taker) : "Free — click to book";
              return `<div class="seat ${cls}" data-seat="${id}" role="button" tabindex="0" aria-label="Seat ${id}, ${tip}">
                ${id}<span class="tip">${tip}</span>
              </div>`;
            }).join("")}</div>`;
          }).join("")}
        </div>
      </div>`).join("");

    view.innerHTML = `
      ${renderDateStrip()}
      <div class="panel">
        <h2>FLOOR PLAN &mdash; ${fmtWeekday(iso)} ${fmtDom(iso)}</h2>
        <p class="sub">Click a free seat to book it for the selected day. One seat per colleague per day. Click your own seat to cancel.</p>
        ${legend}
        <div class="floor">${zonesHtml}</div>
      </div>`;
    wireDateStrip();
    view.querySelectorAll(".seat").forEach(el=>{
      const id = +el.dataset.seat;
      const act = () => {
        const taker = seatOf(iso, id);
        if (!taker) bookSeat(iso, id);
        else if (taker === state.user) cancelSeat(iso, id);
        else return;
        render();
      };
      el.onclick = act;
      el.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); act(); } };
    });
  }

  function renderRooms(){
    const iso = state.date;
    const html = ROOMS.map(r => `
      <div class="room">
        <h3>${r.name.toUpperCase()}</h3>
        <div class="cap">Capacity ${r.cap}</div>
        <div class="slots">
          ${SLOTS.map(s => {
            const taker = roomOf(iso, r.id, s);
            const cls = !taker ? "free" : (taker===state.user ? "you" : "taken");
            const right = taker ? (taker===state.user ? "you" : taker) : "free";
            return `<button class="slot ${cls}" data-room="${r.id}" data-slot="${s}" aria-label="${r.name} ${s} ${right}">
              <span>${s}</span><span class="who-">${right}</span>
            </button>`;
          }).join("")}
        </div>
      </div>`).join("");

    view.innerHTML = `
      ${renderDateStrip()}
      <div class="panel">
        <h2>MEETING ROOMS &mdash; ${fmtWeekday(iso)} ${fmtDom(iso)}</h2>
        <p class="sub">30-minute slots, 09:00&ndash;18:00. Click a free slot to book it. Click yours to cancel. Click multiple consecutive slots to hold a longer meeting.</p>
        <div class="legend">
          <span><span class="sw free"></span>Free</span>
          <span><span class="sw you"></span>Yours</span>
          <span><span class="sw taken"></span>Booked</span>
        </div>
        <div class="rooms">${html}</div>
      </div>`;
    wireDateStrip();
    view.querySelectorAll(".slot").forEach(el=>{
      const rid = el.dataset.room, s = el.dataset.slot;
      el.onclick = () => {
        const taker = roomOf(iso, rid, s);
        if (!taker) bookSlot(iso, rid, s);
        else if (taker === state.user) cancelSlot(iso, rid, s);
        else return;
        render();
      };
    });
  }

  function mergeMineRanges(slots){
    const indices = slots.map(s => SLOTS.indexOf(s)).filter(i => i >= 0).sort((a,b)=>a-b);
    const ranges = [];
    let start = null, prev = -2;
    for (const idx of indices){
      if (idx !== prev + 1) { if (start !== null) ranges.push([start, prev]); start = idx; }
      prev = idx;
    }
    if (start !== null) ranges.push([start, prev]);
    return ranges.map(([a,b]) => {
      const startSlot = SLOTS[a];
      const [h,m] = SLOTS[b].split(":").map(Number);
      const endMin = m + 30; const eh = endMin >= 60 ? h+1 : h; const em = endMin % 60;
      return { start: startSlot, end: `${pad(eh)}:${pad(em)}`, slots: SLOTS.slice(a, b+1) };
    });
  }

  function renderMine(){
    const seatRows = [];
    for (const iso of DATES) {
      const day = state.seats[iso] || {};
      for (const [sid, name] of Object.entries(day)) {
        if (name === state.user) seatRows.push({ iso, sid:+sid, zone: seatZone(+sid) });
      }
    }
    const roomRows = [];
    for (const iso of DATES) {
      const day = state.rooms[iso] || {};
      for (const [rid, slots] of Object.entries(day)) {
        const mine = Object.entries(slots).filter(([,n])=>n===state.user).map(([s])=>s);
        if (mine.length) {
          const ranges = mergeMineRanges(mine);
          for (const r of ranges) roomRows.push({ iso, rid, ...r });
        }
      }
    }
    const seatHtml = seatRows.length ? seatRows.map(r => `
      <li>
        <div>
          <div><b>${fmtWeekday(r.iso)} ${fmtDom(r.iso)}</b></div>
          <div class="meta">Seat ${r.sid} &middot; ${r.zone}</div>
        </div>
        <button class="btn tiny danger" data-cancel-seat="${r.iso}:${r.sid}">CANCEL</button>
      </li>`).join("") : `<li class="empty">No seat bookings yet.</li>`;
    const roomHtml = roomRows.length ? roomRows.map((r,i) => `
      <li>
        <div>
          <div><b>${fmtWeekday(r.iso)} ${fmtDom(r.iso)}</b></div>
          <div class="meta">${ROOMS.find(x=>x.id===r.rid).name} &middot; ${r.start}&ndash;${r.end}</div>
        </div>
        <button class="btn tiny danger" data-cancel-room="${i}">CANCEL</button>
      </li>`).join("") : `<li class="empty">No meeting-room bookings yet.</li>`;

    view.innerHTML = `
      <div class="panel">
        <h2>MY BOOKINGS &mdash; ${state.user.toUpperCase()}</h2>
        <p class="sub">Upcoming bookings for the next ${HORIZON_DAYS} days. Cancel anything you no longer need.</p>
        <div class="mb">
          <section>
            <h3>HOT-DESK</h3>
            <ul>${seatHtml}</ul>
          </section>
          <section>
            <h3>MEETING ROOMS</h3>
            <ul>${roomHtml}</ul>
          </section>
        </div>
      </div>`;
    view.querySelectorAll("[data-cancel-seat]").forEach(b => {
      b.onclick = () => {
        const [iso, sid] = b.dataset.cancelSeat.split(":");
        cancelSeat(iso, +sid); render();
      };
    });
    view.querySelectorAll("[data-cancel-room]").forEach(b => {
      b.onclick = () => {
        const r = roomRows[+b.dataset.cancelRoom];
        if (!r) return;
        for (const slot of r.slots) cancelSlot(r.iso, r.rid, slot);
        render();
      };
    });
  }

  let toastTimer;
  function toast(msg){
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
  }

  const root = document.documentElement;
  const tbtn = document.getElementById("theme");
  const setTheme = t => { root.setAttribute("data-theme", t); tbtn.textContent = t==="dark"?"LIGHT":"DARK"; localStorage.setItem("solhann_theme", t); };
  setTheme(localStorage.getItem("solhann_theme") || "light");
  tbtn.onclick = () => setTheme(root.getAttribute("data-theme")==="dark"?"light":"dark");

  function render(){
    renderHeader();
    if (state.tab === "desks") renderDesks();
    else if (state.tab === "rooms") renderRooms();
    else renderMine();
  }
  render();
})();
</script>
</body>
</html>
